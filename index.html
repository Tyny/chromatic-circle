<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chromatic Circle</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --ink: #e6edf3;
    --muted: #7d8590;
    --accent: #ffb454;
    --ring: #30363d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: radial-gradient(circle at 50% 0%, #1b2430, var(--bg) 70%);
    color: var(--ink);
    font-family: "Segoe UI", system-ui, -apple-system, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 32px 20px 60px;
    text-align: center;
  }
  h1 {
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0 0 4px;
    font-size: 1.6rem;
  }
  p.sub { color: var(--muted); margin: 0 0 24px; font-size: 0.95rem; }

  .stage { position: relative; width: min(90vw, 480px); aspect-ratio: 1; margin: 0 auto; }
  svg { width: 100%; height: 100%; overflow: visible; }

  .note { cursor: pointer; }
  .note .disc {
    fill: var(--panel);
    stroke: var(--ring);
    stroke-width: 1.5;
    transition: fill 0.2s;
  }
  .note .name { fill: var(--ink); font-weight: 600; font-size: 15px; }
  .note .ivl  { fill: var(--muted); font-size: 9px; letter-spacing: 0.03em; }

  .note:hover .disc { stroke: var(--accent); }

  .note.root .disc { fill: var(--accent); stroke: var(--accent); }
  .note.root .name { fill: #1a1200; }
  .note.root .ivl  { fill: #5a3d00; }

  .center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .center .label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; }
  .center .root  { font-size: 2.4rem; font-weight: 700; color: var(--accent); line-height: 1; }

  .controls { margin-top: 28px; display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
  select, button {
    background: var(--panel);
    color: var(--ink);
    border: 1px solid var(--ring);
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:hover, button:hover { border-color: var(--accent); }
  label.ctl { color: var(--muted); font-size: 0.9rem; }
  .toggle input { accent-color: var(--accent); }
  footer { margin-top: 40px; color: var(--muted); font-size: 0.8rem; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Chromatic Circle</h1>
  <p class="sub">Twelve semitones. Click a note to set the root.</p>

  <div class="stage">
    <svg id="circle" viewBox="-160 -160 320 320" aria-label="Chromatic circle"></svg>
    <div class="center">
      <span class="label">Root</span>
      <span class="root" id="rootDisplay">C</span>
    </div>
  </div>

  <div class="controls">
    <label class="ctl" for="rootSelect">Root</label>
    <select id="rootSelect"></select>
    <label class="ctl toggle"><input type="checkbox" id="soundToggle" checked> Sound</label>
    <button id="flatsBtn">♭ Flats</button>
  </div>

  <footer>Shaded bands group the interval families — 2nds, 3rds, 6ths, 7ths (each a minor/major pair). The root, perfect 4th &amp; 5th and tritone are left unshaded.</footer>
</div>

<script>
(function () {
  const SHARPS = ["C","C♯","D","D♯","E","F","F♯","G","G♯","A","A♯","B"];
  const FLATS  = ["C","D♭","D","E♭","E","F","G♭","G","A♭","A","B♭","B"];
  const INTERVALS = ["R","♭2","2","♭3","3","4","♭5","5","♭6","6","♭7","7"];
  const A4 = 440; // Hz, MIDI 69

  // interval "color" families: each spans a minor/major pair of slots (relative to root)
  const ZONES = [
    { label: "2nds", slots: [1, 2],   color: "#3fb0d8" },
    { label: "3rds", slots: [3, 4],   color: "#57c96a" },
    { label: "6ths", slots: [8, 9],   color: "#b07cff" },
    { label: "7ths", slots: [10, 11], color: "#ff7ba6" },
  ];

  let useFlats = false;
  let root = 0;             // 0..11, index of root pitch class
  let soundOn = true;

  const svg = document.getElementById("circle");
  const rootDisplay = document.getElementById("rootDisplay");
  const rootSelect = document.getElementById("rootSelect");
  const SVGNS = "http://www.w3.org/2000/svg";
  const R = 118;            // radius of note ring

  // built once; refs kept for updates
  let ring = null;
  const contents = [];      // inner group per note (counter-rotated to stay upright)
  const noteGroups = [];
  const nameTexts = [];
  const ivlTexts = [];

  function names() { return useFlats ? FLATS : SHARPS; }

  function buildSelect() {
    rootSelect.innerHTML = "";
    names().forEach((n, i) => {
      const o = document.createElement("option");
      o.value = i; o.textContent = n;
      rootSelect.appendChild(o);
    });
    rootSelect.value = root;
  }

  function freqFor(pc) {
    // pick the octave near middle: MIDI 60 (C4) .. 71, then A4=440 reference
    const midi = 60 + pc;
    return A4 * Math.pow(2, (midi - 69) / 12);
  }

  let audioCtx = null;
  function play(pc) {
    if (!soundOn) return;
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "triangle";
      osc.frequency.value = freqFor(pc);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.25, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.95);
    } catch (e) { /* audio not available */ }
  }

  // polar -> cartesian, clock angle in degrees (0 = top, clockwise)
  function polar(r, clockDeg) {
    const a = (clockDeg - 90) * Math.PI / 180;
    return [r * Math.cos(a), r * Math.sin(a)];
  }
  function sectorPath(a1, a2, ri, ro) {
    const [ox1, oy1] = polar(ro, a1), [ox2, oy2] = polar(ro, a2);
    const [ix2, iy2] = polar(ri, a2), [ix1, iy1] = polar(ri, a1);
    const large = (a2 - a1) > 180 ? 1 : 0;
    return `M${ox1.toFixed(2)},${oy1.toFixed(2)} ` +
           `A${ro},${ro} 0 ${large} 1 ${ox2.toFixed(2)},${oy2.toFixed(2)} ` +
           `L${ix2.toFixed(2)},${iy2.toFixed(2)} ` +
           `A${ri},${ri} 0 ${large} 0 ${ix1.toFixed(2)},${iy1.toFixed(2)} Z`;
  }

  function buildZones() {
    const layer = document.createElementNS(SVGNS, "g");
    layer.setAttribute("id", "zones");
    svg.appendChild(layer); // added first -> sits behind the notes

    ZONES.forEach((z) => {
      const a1 = z.slots[0] * 30 - 15;
      const a2 = z.slots[z.slots.length - 1] * 30 + 15;

      const band = document.createElementNS(SVGNS, "path");
      band.setAttribute("d", sectorPath(a1, a2, 90, 148));
      band.setAttribute("fill", z.color);
      band.setAttribute("fill-opacity", "0.16");
      layer.appendChild(band);

      const mid = (a1 + a2) / 2;
      const [lx, ly] = polar(60, mid);
      const t = document.createElementNS(SVGNS, "text");
      t.setAttribute("x", lx.toFixed(2));
      t.setAttribute("y", ly.toFixed(2));
      t.setAttribute("text-anchor", "middle");
      t.setAttribute("dominant-baseline", "middle");
      t.setAttribute("fill", z.color);
      t.setAttribute("font-size", "11");
      t.setAttribute("font-weight", "600");
      t.setAttribute("opacity", "0.9");
      t.textContent = z.label;
      layer.appendChild(t);
    });
  }

  function build() {
    buildZones();

    ring = document.createElementNS(SVGNS, "g");
    ring.setAttribute("id", "ring");
    svg.appendChild(ring);

    for (let i = 0; i < 12; i++) {
      // fixed slot: index 0 at top (12 o'clock), clockwise
      const angle = (i / 12) * 2 * Math.PI - Math.PI / 2;
      const x = R * Math.cos(angle);
      const y = R * Math.sin(angle);

      const g = document.createElementNS(SVGNS, "g");
      g.setAttribute("class", "note");
      g.setAttribute("transform", `translate(${x.toFixed(2)},${y.toFixed(2)})`);
      g.setAttribute("role", "button");
      g.setAttribute("tabindex", "0");

      // inner group counter-rotates against the ring so labels stay upright
      const content = document.createElementNS(SVGNS, "g");

      const disc = document.createElementNS(SVGNS, "circle");
      disc.setAttribute("class", "disc");
      disc.setAttribute("r", "26");
      content.appendChild(disc);

      const name = document.createElementNS(SVGNS, "text");
      name.setAttribute("class", "name");
      name.setAttribute("text-anchor", "middle");
      name.setAttribute("y", "1");
      content.appendChild(name);

      const ivl = document.createElementNS(SVGNS, "text");
      ivl.setAttribute("class", "ivl");
      ivl.setAttribute("text-anchor", "middle");
      ivl.setAttribute("y", "14");
      content.appendChild(ivl);

      g.appendChild(content);
      ring.appendChild(g);

      contents[i] = content;
      noteGroups[i] = g;
      nameTexts[i] = name;
      ivlTexts[i] = ivl;

      const setRoot = () => { root = i; update(); play(i); };
      g.addEventListener("click", setRoot);
      g.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); setRoot(); }
      });
    }
  }

  // --- spin animation ---------------------------------------------------
  let currentRot = 0;       // current ring rotation, degrees
  let fromRot = 0, toRot = 0, startT = 0, animating = false;
  const DUR = 550;
  const easeInOut = (t) => (t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2);

  function applyRotation(rot) {
    ring.setAttribute("transform", `rotate(${rot.toFixed(2)})`);
    const inv = (-rot).toFixed(2);
    for (let i = 0; i < 12; i++) {
      contents[i].setAttribute("transform", `rotate(${inv})`);
    }
  }
  function frame(now) {
    const t = Math.min(1, (now - startT) / DUR);
    currentRot = fromRot + (toRot - fromRot) * easeInOut(t);
    applyRotation(currentRot);
    if (t < 1) requestAnimationFrame(frame);
    else animating = false;
  }
  function spinRootToTop() {
    const desired = -root * 30;                              // move root to 12 o'clock
    let delta = ((desired - currentRot) % 360 + 540) % 360 - 180; // shortest way
    fromRot = currentRot;
    toRot = currentRot + delta;
    startT = performance.now();
    if (!animating) { animating = true; requestAnimationFrame(frame); }
  }

  function update() {
    const nm = names();
    for (let i = 0; i < 12; i++) {
      const interval = INTERVALS[(i - root + 12) % 12];
      nameTexts[i].textContent = nm[i];
      ivlTexts[i].textContent = interval;
      noteGroups[i].setAttribute("class", "note" + (i === root ? " root" : ""));
      noteGroups[i].setAttribute("aria-label", nm[i] + ", interval " + interval);
    }
    rootDisplay.textContent = nm[root];
    rootSelect.value = root;
    spinRootToTop();
  }

  rootSelect.addEventListener("change", () => { root = +rootSelect.value; update(); play(root); });
  document.getElementById("soundToggle").addEventListener("change", (e) => { soundOn = e.target.checked; });
  document.getElementById("flatsBtn").addEventListener("click", () => {
    useFlats = !useFlats;
    document.getElementById("flatsBtn").textContent = useFlats ? "♯ Sharps" : "♭ Flats";
    buildSelect(); update();
  });

  build();
  buildSelect();
  applyRotation(0);
  update();
})();
</script>
</body>
</html>
